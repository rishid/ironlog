name: CI

# Flow: typecheck → docker build (+ push on master/tags)
# Typecheck must pass before Docker is attempted.
# On PRs: builds the image but does not push (validates Dockerfile).
# On push to master: pushes :latest + :sha.
# On version tags (v*): pushes :version + :major.minor + :latest.

on:
  push:
    branches: [ master ]
    tags: [ "v*" ]
  pull_request:
    branches: [ master ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck
        working-directory: frontend
        run: npx vue-tsc --noEmit

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: typecheck
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      # QEMU and multi-platform Buildx are not needed for amd64-only builds,
      # but setup-buildx-action is still required for cache and build features.
      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: GIT_HASH=${{ env.SHORT_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger home-ops deploy
        if: github.event_name != 'pull_request'
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.HOME_OPS }}
          repository: rishid/home-ops
          event-type: app-deploy
          client-payload: "{\"app\": \"ironlog\"}"
